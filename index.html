<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoramento de Portais — Prefeitura de Aracruz</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --accent: #8b1a1a;
      --accent-light: #f9eded;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --online: #16a34a;
      --online-bg: #dcfce7;
      --offline: #dc2626;
      --offline-bg: #fee2e2;
      --checking: #9ca3af;
      --checking-bg: #f3f4f6;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
      --radius: 12px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--card);
      border-bottom: 3px solid var(--accent);
      padding: 20px 16px 16px;
      text-align: center;
    }

    .logo {
      max-width: 260px;
      height: auto;
      display: block;
      margin: 0 auto 12px;
    }

    .header-subtitle {
      font-size: .85rem;
      color: var(--text-muted);
      letter-spacing: .03em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── MAIN ────────────────────────────────────── */
    main {
      flex: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }

    section + section { margin-top: 32px; }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 14px;
    }

    /* ── STATUS CARDS ────────────────────────────── */
    .status-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-left: 4px solid var(--checking);
      transition: border-color .3s;
    }

    .status-card.online  { border-left-color: var(--online); }
    .status-card.offline { border-left-color: var(--offline); }

    .status-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--checking);
      transition: background .3s;
    }

    .status-card.online  .status-dot { background: var(--online); }
    .status-card.offline .status-dot { background: var(--offline); }

    .status-card.checking .status-dot {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .45; transform: scale(.8); }
    }

    .status-info { flex: 1; min-width: 0; }

    .portal-name {
      display: block;
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .status-badge {
      display: inline-block;
      font-size: .78rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      background: var(--checking-bg);
      color: var(--checking);
      transition: background .3s, color .3s;
    }

    .status-card.online  .status-badge { background: var(--online-bg);  color: var(--online); }
    .status-card.offline .status-badge { background: var(--offline-bg); color: var(--offline); }

    .last-check {
      display: block;
      font-size: .73rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── REFRESH BAR ─────────────────────────────── */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .countdown-text {
      font-size: .82rem;
      color: var(--text-muted);
    }

    .btn-refresh {
      background: none;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-refresh:hover { background: var(--accent); color: #fff; }
    .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SERVICES GRID ───────────────────────────── */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .service-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      border: 1.5px solid transparent;
      transition: border-color .15s, box-shadow .15s;
    }

    .service-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(139,26,26,.12);
    }

    .service-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }

    .service-info { flex: 1; min-width: 0; }

    .service-name {
      display: block;
      font-size: .92rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .service-domain {
      display: block;
      font-size: .74rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .service-arrow {
      font-size: 1rem;
      color: var(--accent);
      flex-shrink: 0;
      opacity: .6;
      transition: opacity .15s, transform .15s;
    }

    .service-card:hover .service-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-size: .78rem;
      color: var(--text-muted);
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (min-width: 640px) {
      header { padding: 24px 24px 18px; }

      .logo { max-width: 320px; }

      .status-grid {
        flex-direction: row;
      }

      .status-card { flex: 1; }

      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      main { padding: 36px 24px 48px; }

      .logo { max-width: 360px; }

      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo-preta-2025.png" alt="Prefeitura de Aracruz" class="logo" />
    <p class="header-subtitle">Monitoramento de Portais Institucionais</p>
  </header>

  <main>

    <!-- ── STATUS ── -->
    <section aria-label="Status dos portais">
      <p class="section-title">Status dos portais</p>

      <div class="status-grid">

        <div class="status-card checking" id="card-principal">
          <div class="status-dot"></div>
          <div class="status-info">
            <span class="portal-name">aracruz.es.gov.br</span>
            <span class="status-badge">Verificando…</span>
            <span class="last-check" id="check-principal">—</span>
          </div>
        </div>

        <div class="status-card checking" id="card-servidor">
          <div class="status-dot"></div>
          <div class="status-info">
            <span class="portal-name">servidor.aracruz.es.gov.br</span>
            <span class="status-badge">Verificando…</span>
            <span class="last-check" id="check-servidor">—</span>
          </div>
        </div>

      </div>

      <div class="refresh-bar">
        <span class="countdown-text" id="countdown">Verificando…</span>
        <button class="btn-refresh" id="btn-refresh" onclick="manualRefresh()">
          Verificar agora
        </button>
      </div>
    </section>

    <!-- ── SERVICES ── -->
    <section aria-label="Links dos serviços">
      <p class="section-title">Serviços</p>

      <div class="services-grid" id="services-grid"></div>
    </section>

  </main>

  <footer>
    Feito por Subsecretaria de Comunicação - Prefeitura de Aracruz
  </footer>

  <script>
    // ── Configuração ──────────────────────────────────────────
    const PORTALS = [
      {
        cardId: 'card-principal',
        checkId: 'check-principal',
        url: 'https://aracruz.es.gov.br'
      },
      {
        cardId: 'card-servidor',
        checkId: 'check-servidor',
        url: 'https://servidor.aracruz.es.gov.br'
      }
    ];

    const SERVICES = [
      { name: 'Nota Fiscal',                        icon: '🧾', url: 'https://es-aracruz-pm-nfs.cloud.el.com.br/#/selecaoEmpresa' },
      { name: 'Processo Eletrônico: Servidor',      icon: '📋', url: 'https://aracruz.prefeiturasempapel.com.br/Sistema/' },
      { name: 'Processo Eletrônico: Cidadão',       icon: '🏛️', url: 'https://aracruz.prefeiturasempapel.com.br/portal/login.aspx' },
      { name: 'Webmail',                            icon: '📧', url: 'http://webmail.aracruz.es.gov.br/' },
      { name: 'SIGSS — Sistema Saúde',              icon: '🏥', url: 'http://c3297prd.cloudmv.com.br/sigss/' },
      { name: 'Sistema de Gestão Escolar',          icon: '🏫', url: 'http://sge.pma.es.gov.br:8090/sge/' },
      { name: 'SMARAM — Suprimentos',               icon: '📦', url: 'http://suprimentos.pma.es.gov.br:91/pma/' },
      { name: 'SMARAM — Fundo Municipal de Saúde',  icon: '💊', url: 'http://suprimentos.pma.es.gov.br:91/fmsa/' },
      { name: 'SMARAM — Ipasma',                    icon: '🛡️', url: 'http://suprimentos.pma.es.gov.br:91/ipasma/' },
      { name: 'Portal da Transparência',            icon: '🔍', url: 'http://transparencia.aracruz.es.gov.br/' },
      { name: 'Meio Ambiente 100% Online',          icon: '🌲', url: 'https://aracruz.1doc.com.br/atendimento' },
      { name: 'Meio Ambiente - PMA',                icon: '🎋', url: 'https://aracruz.1doc.com.br/b.php?pg=o/login&n=3' },
    ];

    const FETCH_INTERVAL = 300; // segundos — re-leitura do status.json (Actions roda a cada 10 min)

    // ── Render serviços ───────────────────────────────────────
    (function renderServices() {
      const grid = document.getElementById('services-grid');
      grid.innerHTML = SERVICES.map(s => {
        let domain = '';
        try { domain = new URL(s.url).hostname; } catch (_) {}
        return `
          <a class="service-card" href="${s.url}" target="_blank" rel="noopener noreferrer">
            <span class="service-icon" aria-hidden="true">${s.icon}</span>
            <span class="service-info">
              <span class="service-name">${s.name}</span>
              <span class="service-domain">${domain}</span>
            </span>
            <span class="service-arrow" aria-hidden="true">›</span>
          </a>`;
      }).join('');
    })();

    // ── Carregamento de status (via status.json gerado pelo GitHub Actions) ──
    async function loadStatus() {
      const btn = document.getElementById('btn-refresh');
      btn.disabled = true;

      PORTALS.forEach(({ cardId }) => {
        const card = document.getElementById(cardId);
        card.className = 'status-card checking';
        card.querySelector('.status-badge').textContent = 'Verificando…';
      });

      try {
        const res = await fetch('status.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        if (!Array.isArray(data?.portals) || !data?.checked_at) {
          throw new Error('Formato inválido');
        }

        const checkedAt = new Date(data.checked_at);
        const isStale = (Date.now() - checkedAt.getTime()) > 30 * 60 * 1000;

        const checkedAtStr = checkedAt.toLocaleString('pt-BR', {
          day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        PORTALS.forEach(({ cardId, checkId, url }) => {
          const card  = document.getElementById(cardId);
          const check = document.getElementById(checkId);
          const badge = card.querySelector('.status-badge');

          const entry = data.portals.find(p => p.url === url);

          if (!entry || !['online', 'offline'].includes(entry.status)) {
            card.className = 'status-card offline';
            badge.textContent = 'Desconhecido';
            check.textContent = 'Dados indisponíveis.';
            return;
          }

          const up = entry.status === 'online';
          card.className = `status-card ${up ? 'online' : 'offline'}`;
          badge.textContent = up ? 'Online' : 'Offline';

          let info = `Verificado em: ${checkedAtStr} (HTTP ${entry.http_code}, ${entry.response_time_ms}ms)`;
          if (isStale) info += ' · atenção: dados desatualizados';
          check.textContent = info;
        });

      } catch (_) {
        PORTALS.forEach(({ cardId, checkId }) => {
          const card = document.getElementById(cardId);
          card.className = 'status-card offline';
          card.querySelector('.status-badge').textContent = 'Erro';
          document.getElementById(checkId).textContent = 'Não foi possível obter o status.';
        });
      }

      btn.disabled = false;
    }

    // ── Countdown ─────────────────────────────────────────────
    let secondsLeft = 0;
    let countdownTimer = null;

    function startCountdown() {
      clearInterval(countdownTimer);
      secondsLeft = FETCH_INTERVAL;

      countdownTimer = setInterval(() => {
        secondsLeft--;

        if (secondsLeft <= 0) {
          clearInterval(countdownTimer);
          document.getElementById('countdown').textContent = 'Atualizando…';
          loadStatus().then(startCountdown);
          return;
        }

        const m = Math.floor(secondsLeft / 60);
        const s = String(secondsLeft % 60).padStart(2, '0');
        document.getElementById('countdown').textContent =
          `Próxima atualização em ${m}:${s}`;
      }, 1000);
    }

    function manualRefresh() {
      clearInterval(countdownTimer);
      document.getElementById('countdown').textContent = 'Atualizando…';
      loadStatus().then(startCountdown);
    }

    // ── Inicialização ─────────────────────────────────────────
    loadStatus().then(startCountdown);
  </script>

</body>
</html>
